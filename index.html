<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🥕 保卫萝卜</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a1a2e;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:'Arial',sans-serif;
  color:#fff;
  overflow-x:hidden;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background: radial-gradient(ellipse at 20% 50%, rgba(120,40,200,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(255,150,0,0.06) 0%, transparent 50%);
  pointer-events:none;
}

.topbar {
  width:100%; max-width:820px;
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 14px;
  background:rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.08);
  gap:8px; flex-wrap:wrap;
  position:relative; z-index:10;
}
.title { font-size:1.2rem; font-weight:bold; letter-spacing:0.1em; white-space:nowrap; }
.stat { display:flex; align-items:center; gap:4px; font-size:0.85rem; color:rgba(255,255,255,0.7); }
.stat span { font-weight:bold; color:#ffd700; font-size:0.95rem; }
.stat.hp span { color:#ff6b6b; }
.stat.wave span { color:#6bffb8; }
.stat.score span { color:#c0a0ff; }

/* Boss警告 */
.boss-alert {
  width:100%; max-width:820px;
  background:linear-gradient(135deg,rgba(255,0,0,0.25),rgba(180,0,0,0.15));
  border:1px solid rgba(255,80,80,0.5);
  color:#ff8888;
  text-align:center;
  padding:5px;
  font-size:0.85rem;
  font-weight:bold;
  letter-spacing:0.15em;
  animation:blink 0.6s ease-in-out infinite alternate;
  display:none;
  position:relative; z-index:10;
}
@keyframes blink { from{opacity:0.6} to{opacity:1} }

.shop {
  display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
  padding:6px 14px;
  max-width:820px; width:100%;
  position:relative; z-index:10;
}
.tower-btn {
  display:flex; flex-direction:column; align-items:center;
  padding:5px 10px;
  border-radius:10px;
  border:2px solid transparent;
  background:rgba(255,255,255,0.06);
  color:#fff; cursor:pointer;
  transition:all 0.2s;
  font-size:0.7rem;
  min-width:60px;
  user-select:none;
}
.tower-btn:hover { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.2); }
.tower-btn.selected { border-color:#ffd700; background:rgba(255,215,0,0.12); }
.tower-btn .icon { font-size:1.5rem; line-height:1; }
.tower-btn .name { color:rgba(255,255,255,0.8); margin-top:1px; }
.tower-btn .cost { color:#ffd700; font-weight:bold; }
.tower-btn.disabled { opacity:0.4; cursor:not-allowed; }

.canvas-area {
  position:relative;
  border-radius:12px; overflow:hidden;
  box-shadow:0 0 40px rgba(255,150,0,0.2), 0 0 80px rgba(120,40,200,0.1);
  border:2px solid rgba(255,150,0,0.3);
  max-width:820px; width:100%;
  margin:3px 0;
}
canvas { display:block; width:100%; background:#1e2d1a; }

/* 升级提示弹出 */
.upgrade-popup {
  position:absolute;
  background:rgba(10,10,20,0.95);
  border:1px solid rgba(255,215,0,0.5);
  border-radius:10px;
  padding:8px 12px;
  font-size:0.8rem;
  pointer-events:none;
  z-index:50;
  min-width:130px;
  display:none;
}
.upgrade-popup .up-title { color:#ffd700; font-weight:bold; margin-bottom:4px; }
.upgrade-popup .up-stat  { color:rgba(255,255,255,0.7); font-size:0.75rem; line-height:1.5; }
.upgrade-popup .up-cost  { color:#00ff80; font-weight:bold; margin-top:4px; }
.upgrade-popup .up-sell  { color:#ff9999; font-size:0.72rem; }

.bottom-bar {
  display:flex; gap:8px; padding:6px 14px;
  max-width:820px; width:100%;
  align-items:center; justify-content:center;
  position:relative; z-index:10;
  flex-wrap:wrap;
}
.action-btn {
  padding:8px 18px;
  border-radius:24px; border:none;
  font-size:0.88rem; font-weight:bold;
  cursor:pointer; transition:all 0.2s;
  letter-spacing:0.04em;
}
.btn-start { background:linear-gradient(135deg,#ff9500,#ff6b00); color:#fff; box-shadow:0 4px 15px rgba(255,149,0,0.4); }
.btn-start:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(255,149,0,0.6); }
.btn-sell  { background:rgba(255,100,100,0.2); color:#ff9999; border:1px solid rgba(255,100,100,0.3); }
.btn-sell:hover  { background:rgba(255,100,100,0.35); }
.speed-group { display:flex; gap:4px; align-items:center; }
.speed-label { font-size:0.75rem; color:rgba(255,255,255,0.4); }
.spd-btn {
  padding:6px 12px; border-radius:16px; border:1px solid rgba(100,200,255,0.3);
  background:rgba(100,200,255,0.08); color:rgba(255,255,255,0.5);
  font-size:0.8rem; cursor:pointer; transition:all 0.15s;
}
.spd-btn.active { background:rgba(100,200,255,0.3); color:#fff; border-color:rgba(100,200,255,0.7); }

.overlay {
  position:absolute; inset:0;
  background:rgba(10,10,20,0.9);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; z-index:30; backdrop-filter:blur(6px);
  transition:opacity 0.3s;
}
.overlay.hidden { opacity:0; pointer-events:none; }
.overlay h2 { font-size:1.8rem; text-shadow:0 0 20px currentColor; }
.overlay p  { color:rgba(255,255,255,0.6); text-align:center; line-height:1.8; font-size:0.85rem; }
.overlay .big { font-size:2.8rem; font-weight:bold; }
.btn-play {
  padding:10px 32px; border-radius:50px; border:none;
  background:linear-gradient(135deg,#ff9500,#ff6b00);
  color:#fff; font-size:1rem; font-weight:bold;
  cursor:pointer; transition:all 0.2s;
  box-shadow:0 4px 20px rgba(255,149,0,0.5);
}
.btn-play:hover { transform:translateY(-2px) scale(1.04); }

.hint-bar { color:rgba(255,255,255,0.3); font-size:0.72rem; padding:3px 0 6px; text-align:center; }
</style>
</head>
<body>

<div class="topbar">
  <div class="title">🥕 保卫萝卜</div>
  <div class="stat">💰 <span id="goldVal">150</span></div>
  <div class="stat hp">❤️ <span id="hpVal">20</span></div>
  <div class="stat wave">🌊 波次 <span id="waveVal">0</span></div>
  <div class="stat score">⭐ <span id="scoreVal">0</span></div>
</div>

<div class="boss-alert" id="bossAlert">⚠️ BOSS 来袭！做好准备！⚠️</div>

<div class="shop" id="shop">
  <button class="tower-btn selected" data-type="arrow"  onclick="selectTower('arrow',this)">
    <span class="icon">🏹</span><span class="name">弓箭塔</span><span class="cost">50金</span>
  </button>
  <button class="tower-btn" data-type="cannon" onclick="selectTower('cannon',this)">
    <span class="icon">💣</span><span class="name">炮弹塔</span><span class="cost">80金</span>
  </button>
  <button class="tower-btn" data-type="ice"    onclick="selectTower('ice',this)">
    <span class="icon">❄️</span><span class="name">冰冻塔</span><span class="cost">70金</span>
  </button>
  <button class="tower-btn" data-type="laser"  onclick="selectTower('laser',this)">
    <span class="icon">⚡</span><span class="name">闪电塔</span><span class="cost">100金</span>
  </button>
</div>

<div class="canvas-area">
  <canvas id="gc"></canvas>
  <div class="upgrade-popup" id="upgPopup">
    <div class="up-title" id="upTitle"></div>
    <div class="up-stat"  id="upStat"></div>
    <div class="up-cost"  id="upCost"></div>
    <div class="up-sell"  id="upSell"></div>
  </div>
  <div class="overlay" id="overlay">
    <div style="font-size:3rem">🥕</div>
    <h2 style="color:#ffd700">保卫萝卜</h2>
    <p>在空地放置塔，阻止怪物到达萝卜！<br>
       🏹 弓箭50金 💣 炮弹80金 ❄️冰冻70金 ⚡闪电100金<br>
       <b style="color:#ffd700">点击已有塔可升级（最高3级）</b><br>
       每5波出现💀BOSS！坚持住！</p>
    <button class="btn-play" onclick="startGame()">开始游戏</button>
  </div>
</div>

<div class="bottom-bar">
  <button class="action-btn btn-start" id="waveBtn" onclick="startWave()">▶ 开始下一波</button>
  <button class="action-btn btn-sell"  id="sellBtn" onclick="toggleSell()">🗑 出售模式</button>
  <div class="speed-group">
    <span class="speed-label">速度</span>
    <button class="spd-btn active" onclick="setSpeed(1,this)">1x</button>
    <button class="spd-btn"        onclick="setSpeed(2,this)">2x</button>
    <button class="spd-btn"        onclick="setSpeed(3,this)">3x</button>
  </div>
</div>
<div class="hint-bar">点击空地放塔 · 点击已有塔升级/出售 · 消灭怪物获得金币</div>

<script>
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');

const COLS = 20, ROWS = 14;
let CW, CH, CELL;
function resize() {
  const maxW = Math.min(window.innerWidth, 820);
  CELL = Math.floor(maxW / COLS);
  CW = CELL * COLS; CH = CELL * ROWS;
  canvas.width = CW; canvas.height = CH;
}
resize();
window.addEventListener('resize', ()=>{ resize(); drawAll(); });

// ===== 路径 =====
const PATH_CELLS = [
  {x:0,y:6},{x:1,y:6},{x:2,y:6},{x:3,y:6},{x:4,y:6},
  {x:4,y:5},{x:4,y:4},{x:4,y:3},
  {x:5,y:3},{x:6,y:3},{x:7,y:3},{x:8,y:3},
  {x:8,y:4},{x:8,y:5},{x:8,y:6},{x:8,y:7},{x:8,y:8},
  {x:9,y:8},{x:10,y:8},{x:11,y:8},{x:12,y:8},
  {x:12,y:7},{x:12,y:6},{x:12,y:5},{x:12,y:4},{x:12,y:3},
  {x:13,y:3},{x:14,y:3},{x:15,y:3},
  {x:15,y:4},{x:15,y:5},{x:15,y:6},{x:15,y:7},{x:15,y:8},{x:15,y:9},{x:15,y:10},
  {x:16,y:10},{x:17,y:10},{x:18,y:10},{x:19,y:10}
];
const PATH_SET    = new Set(PATH_CELLS.map(c=>`${c.x},${c.y}`));
const CARROT_CELL = PATH_CELLS[PATH_CELLS.length-1];

// ===== 塔定义（含升级数据）=====
const TOWER_DEFS = {
  arrow:  { emoji:'🏹', cost:50,  color:'#7bff6b',
    levels:[
      { dmg:15, range:2.8, fireRate:55,  splash:0,   slow:0   },
      { dmg:28, range:3.1, fireRate:45,  splash:0,   slow:0   },
      { dmg:48, range:3.5, fireRate:35,  splash:0,   slow:0   },
    ]},
  cannon: { emoji:'💣', cost:80,  color:'#ff9b3b',
    levels:[
      { dmg:40, range:2.5, fireRate:90,  splash:0.8, slow:0   },
      { dmg:75, range:2.8, fireRate:75,  splash:1.0, slow:0   },
      { dmg:130,range:3.2, fireRate:60,  splash:1.3, slow:0   },
    ]},
  ice:    { emoji:'❄️', cost:70,  color:'#6bddff',
    levels:[
      { dmg:8,  range:2.5, fireRate:70,  splash:0.5, slow:0.5 },
      { dmg:15, range:2.8, fireRate:60,  splash:0.7, slow:0.6 },
      { dmg:25, range:3.2, fireRate:50,  splash:0.9, slow:0.7 },
    ]},
  laser:  { emoji:'⚡', cost:100, color:'#e06bff',
    levels:[
      { dmg:25, range:3.2, fireRate:40,  splash:0,   slow:0   },
      { dmg:45, range:3.6, fireRate:32,  splash:0,   slow:0   },
      { dmg:75, range:4.0, fireRate:24,  splash:0,   slow:0   },
    ]},
};

// 升级费用
function upgradeCost(type, level) {
  const base = TOWER_DEFS[type].cost;
  return [Math.round(base*0.8), Math.round(base*1.2)][level] ?? 0;
}

// ===== 怪物定义 =====
// 普通怪（随波次指数增强）
function getEnemyDef(wave) {
  const types = [
    { emoji:'🐛', basehp:80,  spd:1.2, reward:10, size:0.55 },
    { emoji:'🦎', basehp:150, spd:1.0, reward:15, size:0.60 },
    { emoji:'🦂', basehp:280, spd:0.75,reward:22, size:0.65 },
    { emoji:'🐙', basehp:500, spd:0.65,reward:35, size:0.75 },
    { emoji:'👾', basehp:900, spd:0.55,reward:60, size:0.85 },
  ];
  const idx = Math.min(Math.floor(wave/3), types.length-1);
  const d = {...types[idx]};
  // 指数增长：wave^1.4 倍
  const scale = Math.pow(wave, 1.4) * 0.5 + 1;
  d.hp = Math.round(d.basehp * scale);
  d.reward = Math.round(d.reward * (1 + wave*0.12));
  d.isBoss = false;
  return d;
}

// Boss定义
function getBossDef(wave) {
  const tier = Math.floor(wave/5);
  const bosses = [
    { emoji:'🐲', basehp:3000,  spd:0.5,  reward:200, size:1.2 },
    { emoji:'👹', basehp:8000,  spd:0.55, reward:400, size:1.3 },
    { emoji:'🦄', basehp:20000, spd:0.6,  reward:800, size:1.4 },
    { emoji:'☠️', basehp:50000, spd:0.65, reward:1500,size:1.5 },
  ];
  const b = bosses[Math.min(tier-1, bosses.length-1)];
  const scale = 1 + (tier-1)*0.5;
  return { ...b, hp:Math.round(b.basehp*scale), reward:Math.round(b.reward*scale), isBoss:true };
}

// ===== 状态 =====
let gold, hp, wave, score;
let towers=[], enemies=[], bullets=[], particles=[];
let selectedType='arrow', sellMode=false;
let waveActive=false, gameRunning=false;
let speedMult=1;
let spawnQueue=[], spawnTimer=0;
let animId, tickCount=0;
let selectedTower=null; // 点击选中的塔

function initGame() {
  gold=150; hp=20; wave=0; score=0;
  towers=[]; enemies=[]; bullets=[]; particles=[];
  waveActive=false; spawnQueue=[]; spawnTimer=0; tickCount=0;
  selectedTower=null; sellMode=false;
  document.getElementById('bossAlert').style.display='none';
  updateUI();
}

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  initGame(); gameRunning=true;
  cancelAnimationFrame(animId); loop();
}

// ===== UI =====
function updateUI() {
  document.getElementById('goldVal').textContent  = gold;
  document.getElementById('hpVal').textContent    = hp;
  document.getElementById('waveVal').textContent  = wave;
  document.getElementById('scoreVal').textContent = score;
  document.querySelectorAll('.tower-btn').forEach(btn=>{
    btn.classList.toggle('disabled', gold < TOWER_DEFS[btn.dataset.type].cost);
  });
}

function selectTower(type, el) {
  sellMode=false; selectedTower=null;
  selectedType=type;
  document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('sellBtn').style.background='rgba(255,100,100,0.2)';
  hidePopup();
}

function toggleSell() {
  sellMode=!sellMode;
  const btn=document.getElementById('sellBtn');
  btn.style.background=sellMode?'rgba(255,100,100,0.5)':'rgba(255,100,100,0.2)';
  if(sellMode){ document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected')); selectedTower=null; hidePopup(); }
}

function setSpeed(s, el) {
  speedMult=s;
  document.querySelectorAll('.spd-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

// ===== 升级弹窗 =====
function showUpgradePopup(tower, px, py) {
  const def = TOWER_DEFS[tower.type];
  const lvl = tower.level; // 0,1,2
  const popup = document.getElementById('upgPopup');
  const rect  = canvas.getBoundingClientRect();
  const scaleX = rect.width / CW;
  const lv = TOWER_DEFS[tower.type].levels[lvl];

  document.getElementById('upTitle').textContent = `${def.emoji} ${['一','二','三'][lvl]}级塔`;
  document.getElementById('upStat').innerHTML =
    `伤害:${lv.dmg} 范围:${lv.range.toFixed(1)} 射速:${lv.fireRate}`;

  if (lvl < 2) {
    const uc = upgradeCost(tower.type, lvl);
    document.getElementById('upCost').textContent = `🔼 升级花费: ${uc}金`;
    document.getElementById('upCost').style.display='block';
  } else {
    document.getElementById('upCost').textContent='✨ 已满级';
    document.getElementById('upCost').style.display='block';
  }
  const refund = Math.floor(def.cost * (0.5 + lvl*0.15));
  document.getElementById('upSell').textContent=`🗑 出售返还 ${refund}金`;

  // 位置（画布内像素转CSS像素）
  let lx = px * scaleX + rect.left - canvas.parentElement.getBoundingClientRect().left;
  let ly = py * (rect.height/CH) + 4;
  // 防溢出
  popup.style.display='block';
  const pw=popup.offsetWidth, ph=popup.offsetHeight;
  const areaW=canvas.parentElement.offsetWidth;
  if(lx+pw>areaW) lx=areaW-pw-4;
  if(lx<4) lx=4;
  popup.style.left=lx+'px';
  popup.style.top=ly+'px';
}

function hidePopup() {
  document.getElementById('upgPopup').style.display='none';
  selectedTower=null;
}

// ===== 波次 =====
function startWave() {
  if(waveActive||!gameRunning) return;
  wave++;
  waveActive=true;
  updateUI();

  const isBossWave = wave%5===0;
  if(isBossWave){
    const alert=document.getElementById('bossAlert');
    alert.style.display='block';
    setTimeout(()=>alert.style.display='none', 3000);
  }

  spawnQueue=[];
  const count = Math.round(8 + wave*3.5 + Math.pow(wave,1.2)*0.8);
  for(let i=0;i<count;i++) spawnQueue.push(getEnemyDef(wave));
  // Boss波末尾加Boss
  if(isBossWave) spawnQueue.push(getBossDef(wave));
  spawnTimer=0;
}

// ===== 怪物 =====
function spawnEnemy(def) {
  const start=PATH_CELLS[0];
  enemies.push({
    x: start.x*CELL+CELL/2,
    y: start.y*CELL+CELL/2,
    pathIdx:0,
    hp:def.hp, maxHp:def.hp,
    spd:def.spd*CELL*0.016,
    reward:def.reward,
    emoji:def.emoji,
    size:def.size,
    slow:0, slowTimer:0,
    isBoss:def.isBoss,
    id:Math.random()
  });
}

function moveEnemies() {
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.slowTimer>0) e.slowTimer--;
    const spd=e.slowTimer>0?e.spd*(1-e.slow):e.spd;
    const target=PATH_CELLS[e.pathIdx+1];
    if(!target){
      hp=Math.max(0,hp-(e.isBoss?5:1));
      spawnParticle(e.x,e.y,'#ff4444',10);
      enemies.splice(i,1);
      if(hp<=0) gameOverScene();
      updateUI(); continue;
    }
    const tx=target.x*CELL+CELL/2, ty=target.y*CELL+CELL/2;
    const dx=tx-e.x, dy=ty-e.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<spd){ e.x=tx; e.y=ty; e.pathIdx++; }
    else { e.x+=dx/dist*spd; e.y+=dy/dist*spd; }
  }
}

// ===== 塔攻击 =====
function towersAttack() {
  for(const tower of towers){
    tower.cooldown=(tower.cooldown||0)-1;
    if(tower.cooldown>0) continue;
    const lv=TOWER_DEFS[tower.type].levels[tower.level];
    let target=null, bestProg=-1;
    for(const e of enemies){
      const dx=e.x-(tower.x*CELL+CELL/2);
      const dy=e.y-(tower.y*CELL+CELL/2);
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<=lv.range*CELL && e.pathIdx>bestProg){ bestProg=e.pathIdx; target=e; }
    }
    if(!target) continue;
    tower.cooldown=lv.fireRate;
    bullets.push({
      x:tower.x*CELL+CELL/2, y:tower.y*CELL+CELL/2,
      tx:target.x, ty:target.y,
      targetId:target.id,
      spd:CELL*0.2,
      dmg:lv.dmg, splash:lv.splash, slow:lv.slow,
      color:TOWER_DEFS[tower.type].color,
      type:tower.type
    });
  }
}

function moveBullets() {
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    const tgt=enemies.find(e=>e.id===b.targetId);
    if(tgt){ b.tx=tgt.x; b.ty=tgt.y; }
    const dx=b.tx-b.x, dy=b.ty-b.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<b.spd+CELL*0.3){
      hitTarget(b);
      spawnParticle(b.tx,b.ty,b.color,4);
      bullets.splice(i,1);
    } else { b.x+=dx/dist*b.spd; b.y+=dy/dist*b.spd; }
  }
}

function hitTarget(b) {
  if(b.splash>0){
    for(const e of enemies){
      const dx=e.x-b.tx, dy=e.y-b.ty;
      if(Math.sqrt(dx*dx+dy*dy)<=b.splash*CELL) damageEnemy(e,b.dmg,b.slow);
    }
  } else {
    const tgt=enemies.find(e=>e.id===b.targetId);
    if(tgt) damageEnemy(tgt,b.dmg,b.slow);
  }
}

function damageEnemy(e,dmg,slow) {
  e.hp-=dmg;
  if(slow>0){ e.slow=slow; e.slowTimer=120; }
  if(e.hp<=0){
    gold+=e.reward; score+=e.reward*2;
    spawnParticle(e.x,e.y,e.isBoss?'#ff0000':'#ffd700',e.isBoss?20:8);
    enemies.splice(enemies.indexOf(e),1);
    updateUI();
  }
}

// ===== 粒子 =====
function spawnParticle(x,y,color,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*2.5+0.5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:35+Math.random()*20,maxLife:55,color,r:2.5+Math.random()*3});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.07; p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
}

// ===== 绘制 =====
function drawAll(){
  ctx.clearRect(0,0,CW,CH);
  drawMap(); drawTowers(); drawEnemies(); drawBullets(); drawParticles(); drawCarrot();
}

function drawMap(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const isPath=PATH_SET.has(`${c},${r}`);
    const isCarrot=c===CARROT_CELL.x&&r===CARROT_CELL.y;
    ctx.fillStyle=isCarrot?'#1a3a1a':isPath?'#3d2e1a':(c%2===r%2?'#1e3a1a':'#1a3318');
    ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
    if(isPath&&!isCarrot){ ctx.fillStyle='rgba(200,150,80,0.07)'; ctx.fillRect(c*CELL+2,r*CELL+2,CELL-4,CELL-4); }
  }
  ctx.strokeStyle='rgba(255,220,100,0.12)'; ctx.lineWidth=1.5;
  for(let i=0;i<PATH_CELLS.length-2;i++){
    const a=PATH_CELLS[i],b=PATH_CELLS[i+1];
    ctx.beginPath(); ctx.moveTo(a.x*CELL+CELL/2,a.y*CELL+CELL/2); ctx.lineTo(b.x*CELL+CELL/2,b.y*CELL+CELL/2); ctx.stroke();
  }
}

function drawCarrot(){
  const cx=CARROT_CELL.x*CELL+CELL/2, cy=CARROT_CELL.y*CELL+CELL/2;
  const pulse=0.92+0.08*Math.sin(tickCount*0.05);
  ctx.save(); ctx.shadowColor='#ff9500'; ctx.shadowBlur=14;
  ctx.font=`${CELL*0.85*pulse}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🥕',cx,cy); ctx.restore();
}

const LEVEL_COLORS=['','#ffd700','#ff6bff']; // 二级金框，三级紫框
function drawTowers(){
  for(const t of towers){
    const x=t.x*CELL, y=t.y*CELL;
    const def=TOWER_DEFS[t.type];
    const isSelected=selectedTower===t;

    // 底座
    ctx.save();
    ctx.shadowColor=isSelected?'#fff':def.color; ctx.shadowBlur=isSelected?16:6;
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.roundRect(x+2,y+2,CELL-4,CELL-4,4); ctx.fill();
    ctx.strokeStyle=t.level>0?LEVEL_COLORS[t.level]:def.color;
    ctx.lineWidth=t.level>0?2:1.5; ctx.globalAlpha=0.7; ctx.stroke();
    ctx.restore();

    // 图标
    ctx.save(); ctx.font=`${CELL*0.65}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(def.emoji,x+CELL/2,y+CELL/2); ctx.restore();

    // 等级星
    if(t.level>0){
      ctx.save(); ctx.font=`${CELL*0.25}px serif`; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('⭐'.repeat(t.level),x+CELL/2,y+CELL-CELL*0.28); ctx.restore();
    }

    // 攻击范围圈（选中时）
    if(isSelected){
      const lv=def.levels[t.level];
      ctx.save(); ctx.strokeStyle=def.color; ctx.lineWidth=1.5; ctx.globalAlpha=0.3;
      ctx.setLineDash([5,5]); ctx.beginPath();
      ctx.arc(x+CELL/2,y+CELL/2,lv.range*CELL,0,Math.PI*2); ctx.stroke(); ctx.restore();
    }
  }
}

function drawEnemies(){
  for(const e of enemies){
    // HP条
    const bw=CELL*(e.isBoss?1.1:0.9), bh=e.isBoss?7:4;
    const bx=e.x-bw/2, by=e.y-CELL*(e.isBoss?0.75:0.58);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(bx,by,bw,bh);
    const pct=e.hp/e.maxHp;
    ctx.fillStyle=pct>0.6?'#6bff6b':pct>0.3?'#ffb800':'#ff4444';
    ctx.fillRect(bx,by,bw*pct,bh);

    // Boss名条
    if(e.isBoss){
      ctx.save(); ctx.font=`bold ${CELL*0.28}px Arial`; ctx.fillStyle='#ff8888';
      ctx.textAlign='center'; ctx.fillText('💀BOSS',e.x,by-2); ctx.restore();
    }

    // 减速光晕
    if(e.slowTimer>0){
      ctx.save(); ctx.globalAlpha=0.25; ctx.fillStyle='#6bddff';
      ctx.beginPath(); ctx.arc(e.x,e.y,CELL*0.42,0,Math.PI*2); ctx.fill(); ctx.restore();
    }

    // Boss震动特效
    const ox=e.isBoss?(Math.random()-0.5)*2:0;
    ctx.save();
    if(e.isBoss){ ctx.shadowColor='#ff0000'; ctx.shadowBlur=10; }
    ctx.font=`${CELL*e.size}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(e.emoji,e.x+ox,e.y); ctx.restore();
  }
}

function drawBullets(){
  for(const b of bullets){
    ctx.save(); ctx.fillStyle=b.color; ctx.shadowColor=b.color; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.type==='cannon'?5:3.5,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.save(); ctx.globalAlpha=p.life/p.maxLife*0.8; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(p.life/p.maxLife),0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}

// ===== 游戏循环 =====
function loop(){
  if(!gameRunning) return;
  for(let s=0;s<speedMult;s++){
    tickCount++;
    if(waveActive){
      spawnTimer++;
      const interval=Math.max(30,85-wave*2);
      if(spawnTimer>=interval&&spawnQueue.length>0){ spawnEnemy(spawnQueue.shift()); spawnTimer=0; }
      if(spawnQueue.length===0&&enemies.length===0){
        waveActive=false;
        const bonus=25+wave*8; gold+=bonus; score+=150*wave;
        updateUI();
        spawnParticle(CARROT_CELL.x*CELL+CELL/2,CARROT_CELL.y*CELL+CELL/2,'#ffd700',15);
      }
    }
    moveEnemies(); towersAttack(); moveBullets(); updateParticles();
  }
  drawAll();
  animId=requestAnimationFrame(loop);
}

// ===== 点击处理 =====
canvas.addEventListener('click', e=>{
  if(!gameRunning) return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(CW/rect.width);
  const my=(e.clientY-rect.top)*(CH/rect.height);
  const col=Math.floor(mx/CELL), row=Math.floor(my/CELL);
  if(col<0||col>=COLS||row<0||row>=ROWS) return;

  const isPath=PATH_SET.has(`${col},${row}`);
  const isCarrot=col===CARROT_CELL.x&&row===CARROT_CELL.y;
  const existing=towers.find(t=>t.x===col&&t.y===row);

  // 出售模式
  if(sellMode){
    if(existing){
      const refund=Math.floor(TOWER_DEFS[existing.type].cost*(0.5+existing.level*0.15));
      gold+=refund; towers.splice(towers.indexOf(existing),1);
      spawnParticle(col*CELL+CELL/2,row*CELL+CELL/2,'#ffd700',8);
      updateUI(); hidePopup();
    }
    return;
  }

  // 点击已有塔 → 选中 / 升级
  if(existing){
    if(selectedTower===existing){
      // 再次点击 = 升级
      if(existing.level<2){
        const uc=upgradeCost(existing.type,existing.level);
        if(gold>=uc){
          gold-=uc; existing.level++; existing.cooldown=0;
          spawnParticle(col*CELL+CELL/2,row*CELL+CELL/2,TOWER_DEFS[existing.type].color,10);
          updateUI();
          showUpgradePopup(existing, col*CELL, row*CELL+CELL);
        } else {
          document.getElementById('goldVal').style.color='#ff6b6b';
          setTimeout(()=>document.getElementById('goldVal').style.color='#ffd700',400);
        }
      }
    } else {
      selectedTower=existing;
      showUpgradePopup(existing, col*CELL, row*CELL+CELL);
    }
    return;
  }

  // 点击空地 = 取消选中 或 放塔
  if(selectedTower){ hidePopup(); return; }
  if(isPath||isCarrot) return;

  const def=TOWER_DEFS[selectedType];
  if(gold<def.cost){
    document.getElementById('goldVal').style.color='#ff6b6b';
    setTimeout(()=>document.getElementById('goldVal').style.color='#ffd700',400);
    return;
  }
  gold-=def.cost;
  towers.push({x:col,y:row,type:selectedType,level:0,cooldown:0});
  spawnParticle(col*CELL+CELL/2,row*CELL+CELL/2,def.color,6);
  updateUI();
});

// ===== 游戏结束 =====
function gameOverScene(){
  gameRunning=false; cancelAnimationFrame(animId);
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <div style="font-size:3rem">💀</div>
    <h2 style="color:#ff6b6b">萝卜被吃掉了！</h2>
    <div class="big" style="color:#ffd700">${score} 分</div>
    <p>坚持到第 ${wave} 波 · 建造了 ${towers.length} 座塔</p>
    <button class="btn-play" onclick="startGame()">再来一次</button>
  `;
  ov.classList.remove('hidden');
}

// 初始画面
ctx.fillStyle='#1e2d1a'; ctx.fillRect(0,0,CW,CH);
</script>
